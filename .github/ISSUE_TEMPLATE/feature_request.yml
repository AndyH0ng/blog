name: 기능 제안
description: 새로운 기능이나 개선 사항을 제안할 때 사용해 주세요.
labels: ["enhancement"]
body:
  - type: textarea
    id: description
    attributes:
      label: 제안 내용
      description: 어떤 기능을 추가하거나 개선하고 싶은지 설명해 주세요.
    validations:
      required: true

  - type: textarea
    id: motivation
    attributes:
      label: 배경 / 동기
      description: 이 기능이 필요한 이유가 무엇인가요?
    validations:
      required: false

  - type: textarea
    id: alternatives
    attributes:
      label: 고려한 대안
      description: 다른 방법을 생각해 본 적이 있다면 적어 주세요.
    validations:
      required: false
